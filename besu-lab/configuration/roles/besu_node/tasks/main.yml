---
- name: Create data directory
  file:
    path: /opt/besu/data
    state: directory
    owner: besu
    group: besu
    mode: '0755'
  become: yes

- name: Download Besu tarball
  get_url:
    url: "https://github.com/besu-eth/besu/releases/download/{{ besu_version }}/besu-{{ besu_version }}.tar.gz"
    dest: "/tmp/besu-{{ besu_version }}.tar.gz"
    checksum: "{{ besu_tarball_checksum }}"
  become: yes

- name: Create temporary extraction directory
  file:
    path: /tmp/besu-extracted
    state: directory
  become: yes

- name: Extract Besu tarball
  unarchive:
    src: "/tmp/besu-{{ besu_version }}.tar.gz"
    dest: "/tmp/besu-extracted"
    remote_src: yes
    creates: "/tmp/besu-extracted/besu-{{ besu_version }}/bin/besu"
  become: yes

- name: Copy bin and lib to /opt/besu
  copy:
    src: "/tmp/besu-extracted/besu-{{ besu_version }}/{{ item }}/"
    dest: "/opt/besu/{{ item }}/"
    remote_src: yes
    owner: besu
    group: besu
  with_items:
    - bin
    - lib
  become: yes

- name: Download Besu tarball to localhost for configuration generation
  get_url:
    url: "https://github.com/besu-eth/besu/releases/download/{{ besu_version }}/besu-{{ besu_version }}.tar.gz"
    dest: "/tmp/besu-{{ besu_version }}.tar.gz"
    checksum: "{{ besu_tarball_checksum }}"
  delegate_to: localhost
  run_once: true

- name: Generate genesis and keys locally on the controller
  shell: "python3 '{{ playbook_dir }}/../../scripts/generate_besu_config.py'"
  environment:
    BESU_LAB_VERSION: "{{ besu_version }}"
    BESU_LAB_CHAIN_ID: "{{ besu_chain_id }}"
    BESU_LAB_BLOCK_PERIOD_SECONDS: "{{ besu_block_period_seconds }}"
    BESU_LAB_REQUEST_TIMEOUT_SECONDS: "{{ besu_request_timeout_seconds }}"
    BESU_LAB_VALIDATOR_COUNT: "{{ groups['validators'] | length }}"
  delegate_to: localhost
  run_once: true
  register: gen_result
  changed_when: "'Skipping regeneration' not in gen_result.stdout"

- name: Copy genesis.json to all nodes
  copy:
    src: /tmp/besu-dist/genesis.json
    dest: /opt/besu/genesis.json
    owner: besu
    group: besu
    mode: '0644'
  become: yes
  register: genesis_copy
  notify: Restart besu

- name: Clean previous blockchain database to avoid genesis hash mismatch
  file:
    path: /opt/besu/data/database
    state: absent
  become: yes
  when: genesis_copy.changed
  notify: Restart besu

- name: Copy validator private and public keys
  copy:
    src: "/tmp/besu-dist/{{ inventory_hostname }}/{{ item }}"
    dest: "/opt/besu/data/{{ item }}"
    owner: besu
    group: besu
    mode: '0600'
  with_items:
    - key
    - key.pub
  when: inventory_hostname in groups['validators']
  become: yes
  notify: Restart besu

- name: Slurp node public key for bootnode configuration
  slurp:
    src: /opt/besu/data/key.pub
  register: slurped_pubkey
  when: inventory_hostname in groups['validators']
  become: yes

- name: Set facts for key contents
  set_fact:
    node_pubkey: "{{ slurped_pubkey['content'] | b64decode | trim if inventory_hostname in groups['validators'] else '' }}"

- name: Distribute node config.toml
  template:
    src: config.toml.j2
    dest: /opt/besu/config.toml
    owner: besu
    group: besu
    mode: '0644'
  become: yes
  notify: Restart besu

- name: Install systemd service
  template:
    src: besu.service.j2
    dest: /etc/systemd/system/besu.service
    mode: '0644'
  become: yes
  notify:
    - Reload systemd
    - Restart besu

- name: Start and enable Besu service
  service:
    name: besu
    state: started
    enabled: yes
  become: yes
