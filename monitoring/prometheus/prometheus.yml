global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "validator-1:9100"
          - "validator-2:9100"
          - "validator-3:9100"
          - "validator-4:9100"
          - "rpc-node:9100"
        labels:
          role: "node"

  - job_name: "process-exporter"
    static_configs:
      - targets:
          - "validator-1:9256"
          - "validator-2:9256"
          - "validator-3:9256"
          - "validator-4:9256"
          - "rpc-node:9256"
        labels:
          role: "process"

  - job_name: "besu"
    static_configs:
      - targets:
          - "validator-1:9545"
          - "validator-2:9545"
          - "validator-3:9545"
          - "validator-4:9545"
          - "rpc-node:9545"
        labels:
          role: "blockchain"
