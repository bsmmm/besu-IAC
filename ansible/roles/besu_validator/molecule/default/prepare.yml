---
- name: Prepare containers for key-distribution roles
  hosts: all
  gather_facts: no
  tasks:
    - name: Install baseline packages (running as root in container)
      raw: apt-get update && apt-get install -y python3 python3-apt sudo
      changed_when: false

    - name: Gather facts
      setup:

    - name: Set besu_node_ip for template compatibility
      set_fact:
        besu_node_ip: >-
          {{ '10.10.20.13' if inventory_hostname == 'validator-1'
          else '10.10.20.11' if inventory_hostname == 'bootnode-1'
          else '10.10.20.17' }}

    - name: Create besu system user and group
      user:
        name: besu
        system: yes
        create_home: no
        shell: /usr/sbin/nologin

    - name: Create /opt/besu/data directory
      file:
        path: /opt/besu/data
        state: directory
        owner: besu
        group: besu
        mode: '0755'
