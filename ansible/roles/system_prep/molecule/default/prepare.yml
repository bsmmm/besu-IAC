---
- name: Prepare containers for system_prep
  hosts: all
  gather_facts: no
  tasks:
    - name: Install baseline packages (running as root in container)
      raw: apt-get update && apt-get install -y python3 python3-apt sudo
      changed_when: false

    - name: Gather facts
      setup:

    - name: Set besu_node_ip for template compatibility
      set_fact:
        besu_node_ip: "{{ '10.10.20.11' if inventory_hostname == 'bootnode-1' else '10.10.20.13' }}"
